name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff
      - name: Ruff check
        run: ruff check hooks mcp tests
      - name: Ruff format
        run: ruff format --check hooks mcp tests
      - name: Pytest
        run: python -m pytest
